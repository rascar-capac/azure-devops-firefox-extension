<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 420px;
            height: 600px;
            margin: 0;
            font-family: sans-serif;
        }

        #notifications {
            height: 100%;
            overflow-y: auto;
            padding: 8px;
            box-sizing: border-box;
        }

        .notification {
            position: relative;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .notification:hover {
            background: #f5f5f5;
        }

        .notification-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .notification-content {
            font-size: 12px;
        }

        .notification-close {
            position: absolute;
            top: 4px;
            right: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
        }

        .empty {
            text-align: center;
            color: #666;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div id="notifications"></div>

    <script src="popup.js"></script>
</body>

</html>
